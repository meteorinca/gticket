<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milly Monka Golden Ticket</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain"></div>
  <div class="spotlight"></div>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">You found it</p>
      <h1>Milly Monka’s Golden Ticket</h1>
      <p class="subtext">A glossy animated ticket with foil shine, shadow, sparkle, and a message loaded from markdown.</p>

      <div class="controls">
        <button id="openBtn">Open Ticket</button>
        <button id="shineBtn">Replay Shine</button>
        <button id="flipBtn">Flip</button>
      </div>
    </section>

    <section class="stage" aria-label="Golden ticket animation">
      <div class="ticket-wrap" id="ticketWrap" tabindex="0">
        <div class="ticket-shadow"></div>

        <article class="ticket" id="ticket">
          <div class="ticket-face ticket-front">
            <div class="ticket-reflection"></div>
            <div class="ticket-shine"></div>
            <div class="ticket-noise"></div>

            <div class="corner corner-a"></div>
            <div class="corner corner-b"></div>
            <div class="corner corner-c"></div>
            <div class="corner corner-d"></div>

            <div class="ticket-border">
              <div class="ticket-header">Milly Monka</div>
              <div class="ticket-title">Golden Ticket</div>

              <div class="seal">
                <span>★</span>
              </div>

              <div class="message-card" id="ticketMessage">
                Loading ticket message...
              </div>

              <div class="ticket-footer">
                <span>Admit One Dreamer</span>
                <span>No. 0001</span>
              </div>
            </div>
          </div>

          <div class="ticket-face ticket-back">
            <div class="back-pattern"></div>
            <h2>Keep this ticket safe</h2>
            <p>The sparkle fades only when curiosity does.</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
